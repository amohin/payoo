<!DOCTYPE html>
<html data-theme="light" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>


    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">

    <!-- tailwind and daigy -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Outfit:wght@100..900&display=swap" rel="stylesheet">


    <!-- font-awsome- icon -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     

    <style>
        *{
            font-family: "Outfit", sans-serif;
        }
    </style>

</head>
<body class="min-h-screen max-w-md bg-base-200 mx-auto">

    <header class="border-b-2 border-gray-300">
        <section class="w-11/12 mx-auto py-3 flex justify-between items-center">
            <div class="left flex gap-1">

                <div class="logo w-[60px]">
                    <img src="./assets/logo.png" alt="">
                </div>

                <div class="balance-info">
                    <h2 class="text-2xl font-bold">$ <span id="balance">45000</span></h2>
                    <p class="text-neutral/50"> Balance Availacle</p>
                </div>
            </div>
           
            <div class="right">
                <a href="./index.html" class="btn btn-soft"><i class="fa-solid fa-arrow-right-to-bracket"></i> logout</a>
            </div>
        </section>
    </header>    

    <section class="w-11/12 mx-auto space-y-3 ">
        <h2 class="text-2xl font-bold pt-10">welcome to pay<span class="text-primary">oo</span></h2>
        <p class="text-neutral/50"> Lorem ipsum dolor sit amet consectetur adipisicing elit. Tempora id omnis alias?</p>

        <div class="buttons grid grid-cols-3 gap-3 ">
            <button onclick="showOnly('add-money')" class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-1.png" alt="">
                <p>Add money</p>
            </button>
            <button onclick="showOnly('cashout')"class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-2.png" alt="">
                <p>Cash Out </p>
            </button>
            <button class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-3.png" alt="">
                <p>Send Money</p>
            </button>
            <button class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-4.png" alt="">
                <p>Get Bonus</p>
            </button>
            <button class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-5.png" alt="">
                <p>Pay Bill</p>
            </button>
            <button class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-6.png" alt="">
                <p>Transaction</p>
            </button>

        </div>

    </section>

    <!-- add money -->
    <section id="add-money" class="w-11/12 mx-auto py-5 hidden">
        <h2 class="font-bold text-xl mb-5">Add money</h2>
        <div class="card bg-base-100 w-full shadow mx-auto rounded-2xl">
      <div class="card-body">
        <fieldset class="fieldset ">

            <label class="label text-neutral font-bold">Select A Bank</label>
            <select id="add-money-bank" class="select rounded-full w-full bg-base-200 " >
            <option disabled selected>Select the bank</option>
            <option value=" DBBL">DBBL</option>
            <option value="Dhaka Bank">Dhaka Bank</option>
            <option value="Brac Bank">Brac Bank</option>
            </select>

            <br>

          <label class="label text-neutral font-bold">Bank Account Number</label>
          <input id="add-money-number" maxlength="11" minlength="11" type="number" class="input rounded-full" placeholder="Enter Bank Account Number" />

            <br>

          <label class="label text-neutral font-bold">Amount to Add</label>
          <input id="amonut-add-money" type="text" class="input  rounded-full" placeholder="Add amount to withdraw" />
          <br>

          <label class="label text-neutral font-bold">Pin Number</label>
          <input id="add-money-pin" type="password" class="input  rounded-full" placeholder="Enter 4-digit pin number" />
          
          <button id="add-money-btn" class="btn btn-primary mt-4 rounded-full">Add Money</button>

    </section>

    <!-- cashout  -->
    <section id="cashout" class="w-11/12 mx-auto py-5 hidden">
        <h2 class="font-bold text-xl mb-5">Cashout</h2>
        <div class="card bg-base-100 w-full shadow mx-auto rounded-2xl">
      <div class="card-body">
        <fieldset class="fieldset">

          <label class="label text-neutral font-bold">Agent Number</label>
          <input id="input-number" maxlength="11" minlength="11" type="number" class="input rounded-full" placeholder="Enter Your Agent Number" />

            <br>

          <label class="label text-neutral font-bold">Amount</label>
          <input id="input-amount" type="number" class="input  rounded-full" placeholder="Enter amount to withdraw" />

          <label class="label text-neutral font-bold">Pin Number</label>
          <input id="input-pin" type="password" class="input  rounded-full" placeholder="Enter 4-digit pin number" />
          
          <button id="withdraw-btn" class="btn btn-primary mt-4 rounded-full">Withdraw Money</button>
        </fieldset>
      </div>
    </div>
    </section>

    <script src="./script/home.js"></script>
    <script src="./script/addmoney.js"></script>
    <script src="./script/machine.js"></script>
    
</body>
</html>
